<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CricYug - Live Cricket</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

.header{
font-size:28px;
font-weight:bold;
color:#fbbf24;
margin-bottom:20px;
}

.section{
margin-top:30px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:10px;
}

h2{
color:#38bdf8;
}

</style>

</head>

<body>

<div class="header">
🏏 CricYug Live Center
</div>


<div class="section">

<h2>🔥 Live Matches</h2>

<div id="liveMatches"></div>

</div>


<div class="section">

<h2>⏳ Upcoming Matches</h2>

<div id="upcomingMatches"></div>

</div>


<div class="section">

<h2>🏁 Recent Results</h2>

<div id="resultsMatches"></div>

</div>


<script>

const API="https://cricyug-api.vercel.app/api/matches"

async function loadMatches(){

try{

const res=await fetch(API)

const matches=await res.json()

const live=document.getElementById("liveMatches")

const upcoming=document.getElementById("upcomingMatches")

const results=document.getElementById("resultsMatches")

live.innerHTML=""

upcoming.innerHTML=""

results.innerHTML=""

matches.forEach(match=>{

const card=

"<div class='card'>"+
"<h3>"+match.name+"</h3>"+
"<p>"+match.status+"</p>"+
"</div>"

if(match.matchStarted && !match.matchEnded){

live.innerHTML+=card

}

else if(!match.matchStarted){

upcoming.innerHTML+=card

}

else{

results.innerHTML+=card

}

})

}

catch{

document.body.innerHTML+="API error"

}

}

loadMatches()

setInterval(loadMatches,30000)

</script>


</body>

</html>
