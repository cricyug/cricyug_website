<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CricYug</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0b1220,#081024);
color:white;
}

header{
background:#0f172a;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#fbbf24;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

.hero{
padding:30px;
}

.section{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin:10px 0;
}

</style>

</head>

<body>

<header>

<h1>CricYug</h1>

<nav>
<a href="#">Live</a>
<a href="#">Series</a>
<a href="#">Players</a>
<a href="#">News</a>
</nav>

</header>


<div class="hero">

<h2>Cricket ka Naya Yug</h2>

<p>Fastest live score + deep cricket data + AI insights</p>

</div>


<div class="section">

<h2>🔥 Live Matches</h2>

<div id="liveMatches"></div>

</div>


<div class="section">

<h2>⏳ Upcoming Matches</h2>

<div id="upcomingMatches"></div>

</div>


<div class="section">

<h2>🏁 Recent Results</h2>

<div id="resultsMatches"></div>

</div>


<script>

const API="https://cricyug-api.vercel.app/api/matches"

async function loadMatches(){

const res=await fetch(API)

const matches=await res.json()

const live=document.getElementById("liveMatches")
const upcoming=document.getElementById("upcomingMatches")
const results=document.getElementById("resultsMatches")

live.innerHTML=""
upcoming.innerHTML=""
results.innerHTML=""

matches.forEach(m=>{

const card=

"<div class='card'>"+
"<h3>"+m.name+"</h3>"+
"<p>"+m.status+"</p>"+
"</div>"

if(m.matchStarted && !m.matchEnded){

live.innerHTML+=card

}

else if(!m.matchStarted){

upcoming.innerHTML+=card

}

else{

results.innerHTML+=card

}

})

}

loadMatches()

setInterval(loadMatches,30000)

</script>


</body>
</html>
