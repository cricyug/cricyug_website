<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player - CricYug</title>
  <meta name="description" content="Cricket player profile on CricYug." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0b1f2a" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .backBtn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color:var(--text);
      text-decoration:none;
      font-weight:700;
    }

    .pageTitle{
      font-size:14px;
      color:var(--muted);
    }

    .profile{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap:18px;
      align-items:center;
    }

    .avatar{
      width:140px;
      height:140px;
      border-radius:20px;
      object-fit:cover;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .value{
      font-size:16px;
      font-weight:700;
      line-height:1.5;
      white-space:pre-line;
    }

    .miniGrid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:14px;
    }

    .miniCard{
      background: rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
    }

    .ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color:var(--text);
      font-weight:700;
    }

    .ghost:hover{
      background: rgba(255,255,255,.08);
    }

    @media (max-width: 700px){
      .profile{
        grid-template-columns:1fr;
      }
      .miniGrid{
        grid-template-columns:1fr;
      }
      .avatar{
        width:100px;
        height:100px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap" style="padding-top:24px; padding-bottom:50px;">
    <div class="top">
      <a class="backBtn" href="players.html">← Back to Players</a>
      <div class="pageTitle">CricYug Player Center</div>
    </div>

    <div class="card">
      <div class="profile">
        <img id="playerImage" class="avatar" alt="Player image" />
        <div>
          <div class="pill">PLAYER PROFILE</div>
          <h1 id="playerName" style="margin:8px 0 10px;">Loading player...</h1>
          <p id="playerRole" style="margin:0; color:var(--muted);">Loading role...</p>
        </div>
      </div>
    </div>

    <div class="miniGrid">
      <div class="miniCard">
        <div class="label">Country</div>
        <div id="playerCountry" class="value">Loading...</div>
      </div>

      <div class="miniCard">
        <div class="label">Batting Style</div>
        <div id="playerBatting" class="value">Loading...</div>
      </div>

      <div class="miniCard">
        <div class="label">Bowling Style</div>
        <div id="playerBowling" class="value">Loading...</div>
      </div>

      <div class="miniCard">
        <div class="label">Date of Birth</div>
        <div id="playerDob" class="value">Loading...</div>
      </div>
    </div>

    <div class="card">
      <div class="label">AI Player Insight</div>
      <div id="playerInsight" class="value">Loading player insight...</div>
    </div>

    <div class="card">
      <div class="label">Quick Actions</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="ghost" href="index.html">Home</a>
        <a class="ghost" href="news.html">News</a>
        <a class="ghost" href="players.html">Players</a>
        <a class="ghost" href="teams.html">Teams</a>
      </div>
    </div>
  </div>

  <script>
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function getFallbackPlayer(id) {
      const players = {
        "virat-kohli": {
          name: "Virat Kohli",
          role: "Top-order Batter",
          country: "India",
          batting: "Right-hand bat",
          bowling: "Right-arm medium",
          dob: "5 Nov 1988",
          image: "",
          insight: "Virat Kohli is one of the most reliable top-order batters in modern cricket. CricYug AI marks him as a high-impact chase player with strong consistency."
        },
        "babar-azam": {
          name: "Babar Azam",
          role: "Top-order Batter",
          country: "Pakistan",
          batting: "Right-hand bat",
          bowling: "Right-arm offbreak",
          dob: "15 Oct 1994",
          image: "",
          insight: "Babar Azam is known for control, timing and consistency. CricYug AI sees him as a stability anchor in batting-heavy match situations."
        },
        "steve-smith": {
          name: "Steve Smith",
          role: "Top-order Batter",
          country: "Australia",
          batting: "Right-hand bat",
          bowling: "Right-arm legbreak",
          dob: "2 Jun 1989",
          image: "",
          insight: "Steve Smith is a high-value test and ODI batter. CricYug AI rates him as a strong problem-solver under difficult match conditions."
        },
        "joe-root": {
          name: "Joe Root",
          role: "Top-order Batter",
          country: "England",
          batting: "Right-hand bat",
          bowling: "Right-arm offbreak",
          dob: "30 Dec 1990",
          image: "",
          insight: "Joe Root provides balance and long-innings stability. CricYug AI highlights him as a technically dependable batter."
        },
        "jasprit-bumrah": {
          name: "Jasprit Bumrah",
          role: "Fast Bowler",
          country: "India",
          batting: "Right-hand bat",
          bowling: "Right-arm fast",
          dob: "6 Dec 1993",
          image: "",
          insight: "Jasprit Bumrah is an elite fast bowler with control and death-over value. CricYug AI rates him as a match-shaping bowling asset."
        },
        "kane-williamson": {
          name: "Kane Williamson",
          role: "Top-order Batter",
          country: "New Zealand",
          batting: "Right-hand bat",
          bowling: "Right-arm offbreak",
          dob: "8 Aug 1990",
          image: "",
          insight: "Kane Williamson is a calm, technically strong batter. CricYug AI sees him as a smart tempo controller in long-format and ODI matches."
        }
      };

      return players[id] || {
        name: "Player Not Found",
        role: "Unknown Role",
        country: "Unknown",
        batting: "N/A",
        bowling: "N/A",
        dob: "N/A",
        image: "",
        insight: "CricYug AI could not find this player in the current player set."
      };
    }

    function loadPlayer() {
      const id = getQueryParam("id") || "virat-kohli";
      const player = getFallbackPlayer(id);

      document.title = `${player.name} - CricYug`;
      document.getElementById("playerName").textContent = player.name;
      document.getElementById("playerRole").textContent = player.role;
      document.getElementById("playerCountry").textContent = player.country;
      document.getElementById("playerBatting").textContent = player.batting;
      document.getElementById("playerBowling").textContent = player.bowling;
      document.getElementById("playerDob").textContent = player.dob;
      document.getElementById("playerInsight").textContent = player.insight;

      const img = document.getElementById("playerImage");
      if (player.image) {
        img.src = player.image;
      } else {
        img.style.display = "none";
      }
    }

    loadPlayer();
  </script>
</body>
</html>
