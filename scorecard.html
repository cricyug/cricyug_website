<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Scorecard - CricYug</title>

<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">

<style>

.scoreTable{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.scoreTable th,
.scoreTable td{
padding:10px;
border-bottom:1px solid var(--line);
text-align:left;
}

.scoreTable th{
color:var(--muted);
font-size:13px;
}

.sectionTitle{
margin-top:20px;
margin-bottom:10px;
font-weight:700;
}

</style>

</head>

<body>

<div class="wrap" style="padding-top:30px;padding-bottom:50px;">

<a class="ghost" href="index.html">← Back</a>

<div class="card">

<h2 id="matchTitle">Loading match...</h2>

<p id="matchStatus" style="color:var(--muted)"></p>

</div>


<div class="card">

<div class="sectionTitle">Score Summary</div>

<div id="scoreSummary">Loading...</div>

</div>


<div class="card">

<div class="sectionTitle">Batting</div>

<table class="scoreTable">

<thead>
<tr>
<th>Batter</th>
<th>R</th>
<th>B</th>
<th>4s</th>
<th>6s</th>
</tr>
</thead>

<tbody id="battingTable">
<tr>
<td colspan="5">Loading batting...</td>
</tr>
</tbody>

</table>

</div>


<div class="card">

<div class="sectionTitle">Bowling</div>

<table class="scoreTable">

<thead>
<tr>
<th>Bowler</th>
<th>O</th>
<th>R</th>
<th>W</th>
</tr>
</thead>

<tbody id="bowlingTable">
<tr>
<td colspan="4">Loading bowling...</td>
</tr>
</tbody>

</table>

</div>

</div>


<script>

function getQueryParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

const API_BASE = "https://cricyug-api.vercel.app/api/match";


async function loadScorecard(){

const id = getQueryParam("id");

if(!id){
document.getElementById("matchTitle").textContent = "Match ID missing";
return;
}

try{

const res = await fetch(API_BASE + "?id=" + id);
const json = await res.json();

const match = json.data;

document.getElementById("matchTitle").textContent = match.name || "Match";
document.getElementById("matchStatus").textContent = match.status || "";

if(Array.isArray(match.score)){

document.getElementById("scoreSummary").innerHTML =
match.score.map(s =>
`${s.inning}: ${s.r}/${s.w} (${s.o} ov)`
).join("<br>");

}

renderBatting();
renderBowling();

}catch(err){

document.getElementById("scoreSummary").textContent =
"Scorecard could not load.";

}

}


function renderBatting(){

const players = [
["Player A",45,32,6,1],
["Player B",31,28,3,0],
["Player C",22,14,2,1],
["Player D",12,10,1,0]
];

const html = players.map(p =>

`<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td>${p[2]}</td>
<td>${p[3]}</td>
<td>${p[4]}</td>
</tr>`

).join("");

document.getElementById("battingTable").innerHTML = html;

}


function renderBowling(){

const bowlers = [
["Bowler A",4,28,2],
["Bowler B",4,35,1],
["Bowler C",3,18,0]
];

const html = bowlers.map(b =>

`<tr>
<td>${b[0]}</td>
<td>${b[1]}</td>
<td>${b[2]}</td>
<td>${b[3]}</td>
</tr>`

).join("");

document.getElementById("bowlingTable").innerHTML = html;

}


loadScorecard();

</script>

</body>
</html>
