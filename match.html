<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Details - CricYug</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1f2a;
      color: white;
      padding: 24px;
    }
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 24px;
    }
    .muted {
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="matchName">Loading...</h1>
    <p id="matchStatus" class="muted"></p>
    <p id="matchVenue" class="muted"></p>
    <p id="matchTeams"></p>
    <p id="matchState"></p>
  </div>

  <script>
    const API_URL = "https://cricyug-api.vercel.app/api/matches";

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    async function loadMatch() {
      const id = getQueryParam("id");

      if (!id) {
        document.getElementById("matchName").textContent = "Match ID missing";
        return;
      }

      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        if (json.apiStatus !== "success" || !Array.isArray(json.data)) {
          document.getElementById("matchName").textContent = "Failed to load match";
          return;
        }

        const match = json.data.find(m => m.id === id);

        if (!match) {
          document.getElementById("matchName").textContent = "Match not found";
          return;
        }

        document.getElementById("matchName").textContent = match.name || "Match";
        document.getElementById("matchStatus").textContent = match.status || "No status";
        document.getElementById("matchVenue").textContent = "Venue: " + (match.venue || "Unknown venue");
        document.getElementById("matchTeams").textContent = "Teams: " + ((match.teams || []).join(" vs "));
        document.getElementById("matchState").textContent =
          match.matchEnded ? "Result declared" :
          match.matchStarted ? "Live match" : "Upcoming match";
      } catch (err) {
        document.getElementById("matchName").textContent = "Error loading match";
      }
    }

    loadMatch();
  </script>
</body>
</html>
