
<!DOCTYPE html>
<html>
<head>
<title>CricYug Admin Panel</title>
<style>
body{font-family:Arial;background:#0b1a1f;color:white;margin:0}
header{background:#0f3f48;padding:20px}
.container{padding:20px}
input,button{padding:8px;margin:5px}
.card{background:#1fb0cf;padding:15px;border-radius:6px;margin-top:10px}
</style>
</head>
<body>

<header>
<h1>CricYug ADMIN PANEL</h1>
<p>Manage Matches • Players • Teams</p>
</header>

<div class="container">

<h2>Add Match</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">
<input id="venue" placeholder="Venue">
<button onclick="addMatch()">Add Match</button>

<div id="result"></div>

</div>

<script>
async function addMatch(){

 const team1=document.getElementById("team1").value
 const team2=document.getElementById("team2").value
 const venue=document.getElementById("venue").value

 const r=await fetch("http://localhost:5000/api/admin/match",{
   method:"POST",
   headers:{ "Content-Type":"application/json"},
   body:JSON.stringify({team1,team2,venue})
 })

 const j=await r.json()

 document.getElementById("result").innerHTML=
  '<div class="card">Match Added: '+j.data.team1+' vs '+j.data.team2+'</div>'
}
</script>

</body>
</html>
